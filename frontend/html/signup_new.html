<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Register new account</h2>

            <form id="form-signup-user" action="{{ url_for('auth.signup_process') }}" method="POST">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="nama" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="nama@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="your password" required>
                </div>

                <input type="hidden" name="role" value="user">

                <button type="submit" class="btn-auth">Sign Up</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login-user">Log In</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='javascript/signup.js') }}"></script>
</body>

</html>
