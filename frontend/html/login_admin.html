<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 style="color: var(--secondary);">Admin Access</h2>
            <p>authorized personnel only</p>

            <form id="login-form">
                <div class="form-group">
                    <label>Admin Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn-auth" style="background: var(--secondary);">Login</button>
            </form>

            <div class="auth-footer">
                <a href="/"> &larr; Back to Homepage</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='javascript/login.js') }}"></script>
</body>

</html>
